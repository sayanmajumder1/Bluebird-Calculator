<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scientific Calculator</title>
  <style>
    body {
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }

    /* Calculator Grid Design */
    .calculator {
      background-color: #cbd4ce;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      display: grid;
      grid-template-columns: repeat(4, 80px);
      grid-gap: 10px;
      border: 2px solid #444;
    }

    .display {
      grid-column: 1 / -1;
      background-color: #666;
      color: #fff;
      padding: 10px;
      font-size: 24px;
      text-align: right;
      border-radius: 10px;
      margin-bottom: 10px;
      min-height: 30px;
    }

    .button {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      font-size: 18px;
      background-color: #666;
      color: #fff;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.3s;
    }

    .button:hover {
      background-color: #888;
      transform: translateY(4px);
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
    }

    /* History Button specific style */
    .history-btn-style {
      background-color: #444;
      font-weight: bold;
    }

    /* Full History Panel */
    .history-panel {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(34, 34, 34, 0.98);
      color: white;
      z-index: 10001;
      display: flex;
      flex-direction: column;
      padding: 30px;
      box-sizing: border-box;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #555;
      padding-bottom: 10px;
    }

    .history-list {
      flex-grow: 1;
      overflow-y: auto;
      margin: 20px 0;
    }

    .history-item {
      padding: 15px;
      border-bottom: 1px solid #333;
      font-size: 1.2rem;
    }

    .close-btn, .clear-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    .close-btn { background-color: #e74c3c; color: white; }
    .clear-btn { background-color: #555; color: white; width: 100%; margin-top: 10px; }

    /* Splash Screen Styles */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .splash-content {
      text-align: center;
      color: white;
    }

    .brand-name { font-size: 32px; margin-bottom: 20px; }

    /* Responsive adjustments */
    @media only screen and (max-width: 768px) {
      .calculator { grid-template-columns: repeat(4, 60px); }
      .button { width: 50px; height: 50px; font-size: 14px; }
    }
  </style>
</head>
<body>

  <div class="overlay" id="splashOverlay">
    <div class="splash-content">
        <div class="brand-name">Blue Bird</div>
        <img src="image/u.png" alt="Scientific Calculator Image" onerror="this.style.display='none'">
        <h1>Welcome to Scientific Calculator</h1>
        <p>Loading...</p>
    </div>
  </div>

  <div id="historyPanel" class="history-panel" style="display: none;">
    <div class="history-header">
      <h2>History Log</h2>
      <button class="close-btn" onclick="toggleHistory()">Close</button>
    </div>
    <div id="historyList" class="history-list">
      </div>
    <button class="clear-btn" onclick="clearHistory()">Clear History</button>
  </div>

  <div class="calculator" id="calcContainer" style="display: none;">
    <div id="display" class="display">0</div>
    
    <button class="button" onclick="appendToDisplay('7')">7</button>
    <button class="button" onclick="appendToDisplay('8')">8</button>
    <button class="button" onclick="appendToDisplay('9')">9</button>
    <button class="button" onclick="appendToDisplay('/')">÷</button>
    
    <button class="button" onclick="appendToDisplay('4')">4</button>
    <button class="button" onclick="appendToDisplay('5')">5</button>
    <button class="button" onclick="appendToDisplay('6')">6</button>
    <button class="button" onclick="appendToDisplay('*')">x</button>
    
    <button class="button" onclick="appendToDisplay('1')">1</button>
    <button class="button" onclick="appendToDisplay('2')">2</button>
    <button class="button" onclick="appendToDisplay('3')">3</button>
    <button class="button" onclick="appendToDisplay('-')">-</button>
    
    <button class="button" onclick="appendToDisplay('0')">0</button>
    <button class="button" onclick="appendToDisplay('.')">.</button>
    <button class="button" onclick="calculate()">=</button>
    <button class="button" onclick="appendToDisplay('+')">+</button>

    <button class="button" onclick="plusMinusFunc()">±</button>
    <button class="button" onclick="clearDisplay()">AC</button>
    <button class="button" onclick="delFunc()">del</button>
    
    <button class="button history-btn-style" onclick="toggleHistory()">HIS</button>

    <button class="button" onclick="sinFunc()">sin</button>
    <button class="button" onclick="cosFunc()">cos</button>
    <button class="button" onclick="tanFunc()">tan</button> 
    <button class="button" onclick="asinFunc()">sin⁻¹</button>
    <button class="button" onclick="acosFunc()">cos⁻¹</button>
    <button class="button" onclick="atanFunc()">tan⁻¹</button>   
    <button class="button" onclick="lnFunc()">ln</button>
    <button class="button" onclick="squareRoot()">√</button>
    <button class="button" onclick="cubicRootFunc()">3√</button>
    <button class="button" onclick="factorialFunc()">!</button>
    <button class="button" onclick="squareFunc()">x²</button>
    <button class="button" onclick="cubeFunc()">x³</button>
    <button class="button" onclick="combinationFunc()">nCr</button>
    <button class="button" onclick="permutationFunc()">nPr</button>
    <button class="button" onclick="piFunc()">π</button>
    <button class="button" onclick="appendToDisplay(')')">)</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/9.5.0/math.js"></script>
  <script src="script.js"></script>
</body>
</html>
