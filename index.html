</head>



<body>
  <div class="overlay" id="splashOverlay">
    <div class="splash-content">
        <div class="brand-name">Blue Bird</div>
        <img src="image/u.png" alt="Scientific Calculator Image">
        <h1>Welcome to Scientific Calculator</h1>
        <p>Loading...</p>
    </div>
  </div>

  <div class="calculator" style="display: none;">
    
    <div class="history" id="history">
      <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #666; padding-bottom: 5px; margin-bottom: 10px;">
        <strong style="color: #333; font-size: 18px; font-family: sans-serif;">History</strong>
        <button onclick="toggleHistory()" style="background: none; border: none; font-size: 28px; color: #333; cursor: pointer; padding: 0 5px; line-height: 1;">&times;</button>
      </div>
      <div id="history-list">
        <div style="color: #666; font-style: italic; font-size: 14px;">No calculations yet</div>
      </div>
    </div>

    <div id="display" class="display">0</div>
    <button class="button" onclick="appendToDisplay('7')">7</button>
    <button class="button" onclick="appendToDisplay('8')">8</button>
    <button class="button" onclick="appendToDisplay('9')">9</button>
    <button class="button" onclick="appendToDisplay('/')">÷</button>
    
    <button class="button" onclick="appendToDisplay('4')">4</button>
    <button class="button" onclick="appendToDisplay('5')">5</button>
    <button class="button" onclick="appendToDisplay('6')">6</button>
    <button class="button" onclick="appendToDisplay('*')">x</button>
    
    <button class="button" onclick="appendToDisplay('1')">1</button>
    <button class="button" onclick="appendToDisplay('2')">2</button>
    <button class="button" onclick="appendToDisplay('3')">3</button>
    <button class="button" onclick="appendToDisplay('-')">-</button>
    
    <button class="button" onclick="appendToDisplay('0')">0</button>
    <button class="button" onclick="appendToDisplay('.')">.</button>
    <button class="button" onclick="calculate()">=</button>
    <button class="button" onclick="appendToDisplay('+')">+</button>
    
    <button class="button" onclick="plusMinusFunc()">±</button>

    <!-- Contribute By  Nandan Mukherjee-->
    <button class="button" onclick="exponentialFunc()">e^</button>


    <button class="button" onclick="clearDisplay()">AC</button>
    <button class="button" onclick="delFunc()">del</button>
    <button class="button" onclick="sinFunc()">sin</button>
    
    <button class="button" onclick="cosFunc()">cos</button>
    <button class="button" onclick="tanFunc()">tan</button> 
    <button class="button" onclick="asinFunc()">sin⁻¹</button>
    <button class="button" onclick="acosFunc()">cos⁻¹</button>
    
    <button class="button" onclick="atanFunc()">tan⁻¹</button>   
    <button class="button" onclick="lnFunc()">ln</button>
    <button class="button" onclick="squareRoot()">√</button>
    <button class="button" onclick="cubicRootFunc()">3√</button>
    
    <button class="button" onclick="factorialFunc()">!</button>
    <button class="button" onclick="squareFunc()">x²</button>
    <button class="button" onclick="cubeFunc()">x³</button>
    <button class="button" onclick="combinationFunc()">nCr</button>
    
    <button class="button" onclick="permutationFunc()">nPr</button>
    <button class="button" onclick="piFunc()">π</button>
    <button class="button" onclick="appendToDisplay(')')">)</button>
    <!--COntribute By Shubhodeep Laha-->
    <button class="button" onclick="toggleHistory()">His</button>

    <button class="button" style="font-size: 15px;" onclick="undoFunc()">Undo</button>
    <button class="button" style="font-size: 15px;" onclick="redoFunc()">Redo</button>
    <button class="button" onclick="appendToDisplay('(')">(</button>
    
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/9.5.0/math.js"></script>
  <script src="JS/script.js"></script>
</body>
</html>
